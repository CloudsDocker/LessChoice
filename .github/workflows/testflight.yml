name: Deploy to TestFlight

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Install Ruby and fastlane
        run: |
          gem install bundler
          gem install fastlane

      - name: Write local Config.swift
        run: |
          cat > DecisionDeck/Config.swift <<EOF
          import Foundation

          enum Config {
              static let backendBaseURL = "${{ secrets.BACKEND_BASE_URL }}"
              static let appSharedSecret = "${{ secrets.APP_SHARED_SECRET }}"
          }
          EOF

      - name: Import distribution certificate
        env:
          DIST_CERTIFICATE_P12_BASE64: ${{ secrets.DIST_CERTIFICATE_P12_BASE64 }}
          DIST_CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
          CI_KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"
          security create-keychain -p "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DIST_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN_PATH" -P "$DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$CI_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/ci.mobileprovision"

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}
        run: |
          echo "$ASC_KEY_CONTENT_BASE64" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ${{ runner.temp }}/asc_key.p8
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: fastlane beta
